name: Build and deploy Node.js app to Azure Web App - zuczki

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install and build React
        run: |
          cd client
          npm install
          npm run build
          cd ..

      - name: Copy React build
        run: cp -r client/build ./client-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            index.js
            package.json
            package-lock.json
            web.config
            client-build/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C4E0DE84BD24465B802DDBF97EB79898 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_BBF4DD4E6AAC4213956A53880C0C7D9A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_BE90A7B8ABE649E6B4D9D0A4A0ACF24A }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'zuczki'
          slot-name: 'Production'
          package: .